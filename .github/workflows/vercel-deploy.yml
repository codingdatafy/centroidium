name: Deploy Content Update to Vercel

on:
  repository_dispatch:
    types: [content_updated]
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the Engine source code
      - name: Checkout Engine Code
        uses: actions/checkout@v4

      # Step 2: Dynamically fetch the content from the 'content' repository using GitHub API/Actions
      - name: Fetch Website Content
        uses: actions/checkout@v4
        with:
          repository: 'CodingDatafy/content'
          path: 'content-temp'
          token: ${{ secrets.CENTROIDIUM_PAT }}
          ref: ${{ github.event.client_payload.branch || github.ref_name }}

      # Step 3: Move the 'data' folder from content root into engine root data directory
      - name: Inject Content into Engine
        run: |
          rm -rf data
          mkdir -p data
          if [ -d "content-temp/data" ]; then
            cp -r content-temp/data/* data/
            echo "Data synchronized into root data folder successfully."
            ls -la data
          else
            echo "Error: content-temp/data directory does not exist!" && exit 1
          fi
          rm -rf content-temp
          
      # Step 4: Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Step 5: Install Vercel CLI
      - name: Install Vercel CLI
        run: npm install -g vercel

      # Step 6: Pull Vercel Environment (Dynamically switch production/preview)
      - name: Pull Vercel Environment Information
        run: |
          CURRENT_BRANCH="${{ github.event.client_payload.branch || github.ref_name }}"
          if [ "$CURRENT_BRANCH" = "main" ]; then
            vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          fi
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Step 7: Build Project Artifacts
      - name: Build Project Artifacts
        run: |
          CURRENT_BRANCH="${{ github.event.client_payload.branch || github.ref_name }}"
          if [ "$CURRENT_BRANCH" = "main" ]; then
            vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel build --token=${{ secrets.VERCEL_TOKEN }}
          fi
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      # Step 8: Deploy Artifacts to Vercel
      - name: Deploy Artifacts to Vercel
        run: |
          CURRENT_BRANCH="${{ github.event.client_payload.branch || github.ref_name }}"
          if [ "$CURRENT_BRANCH" = "main" ]; then
            vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
          fi
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}