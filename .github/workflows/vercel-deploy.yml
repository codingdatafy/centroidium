name: Deploy Content Update to Vercel

on:
  repository_dispatch:
    types: [content_updated]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # ==========================================
      # Step 1: Environment Initialization
      # ==========================================
      # Using checkout to pull the repository code
      - name: Checkout Engine Repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      # We skip setup-node entirely
      - name: Verify Environment Node Version
        run: |
          node -v
          npm -v

      - name: Install Project Dependencies
        run: npm ci

      # ==========================================
      # Step 2: Content Injection (Root Layer)
      # ==========================================
      - name: Clone Content Repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          repository: 'CodingDatafy/content'
          path: 'content-temp'
          token: ${{ secrets.ORGANIZATION_GITHUB_TOKEN }}

      - name: Inject Content into Engine Root
        run: |
          rm -rf data
          mkdir -p data
          if [ -d "content-temp/data" ]; then
            cp -r content-temp/data/* data/
            echo "Data workspace successfully injected into root."
            ls -la data
          else
            echo "Critical Error: Content workspace missing!" && exit 1
          fi
          rm -rf content-temp

      # ==========================================
      # Step 3: Vercel Compilation & Production Deployment
      # ==========================================
      - name: Install Vercel CLI Globally
        run: npm install -g vercel@latest

      - name: Pull Vercel Environment Management
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Local Project Artifacts (Prebuilt Mode)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Prebuilt Artifacts to Vercel Production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}